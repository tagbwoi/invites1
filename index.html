<style>
  .heart {
    position:  fixed ;
    top: 0;
    z-index: 9999;
    pointer-events: none;
    animation: fall linear forwards;
    opacity: 0.7;
  }

  .heart-inner {
    animation: sway ease-in-out infinite alternate;
    display: inline-block;
  }

  @keyframes fall {
    0% {
      transform: translateY(0);
      opacity: 0.7;
    }
    100% {
      transform: translateY(100vh);
      opacity: 0;
    }
  }

  @keyframes sway {
    0%   { transform: translateX(0); }
    50%  { transform: translateX(10px); }
    100% { transform: translateX(-10px); }
  }
</style>

<script>
  // ===== Параметрлер =====
  const SPEED_PX_PER_SEC = 50;      // жылдамдық (px/сек)
  const RESTART_DELAY_MS = 5000;    // пайдаланушы әрекетінен кейін қайта қосу кідірісі

  // ===== Элементтер =====
  const modal = document.getElementById("musicModal");
  const playButton = document.getElementById("playMusic");
  const audio = document.getElementById("backgroundMusic");

  document.documentElement.style.scrollBehavior = 'auto';
  document.body.style.scrollBehavior = 'auto';
  document.body.style.overflow = 'hidden'; // модал ашық кезде скролды бұғаттау

  // ===== Күй =====
  let isRunning = false;    
  let resumeTimer = null;   
  let rafId = null;         
  let lastTs = 0;           
  let accum = 0;            

  // Қауіпсіз скрол функциясы
  function safeScrollBy(step) {
    const before = window.pageYOffset ||
      document.documentElement.scrollTop ||
      document.body.scrollTop || 0;

    window.scrollBy(0, step);

    let after = window.pageYOffset ||
      document.documentElement.scrollTop ||
      document.body.scrollTop || 0;

    if (after === before) {
      document.documentElement.scrollTop = before + step;
      after = window.pageYOffset ||
        document.documentElement.scrollTop ||
        document.body.scrollTop || 0;

      if (after === before) {
        document.body.scrollTop = before + step;
      }
    }
  }

  function atBottom() {
    const maxScroll =
      Math.max(document.documentElement.scrollHeight, document.body.scrollHeight) - window.innerHeight;
    const y = window.pageYOffset ||
      document.documentElement.scrollTop ||
      document.body.scrollTop || 0;
    return y >= maxScroll - 1;
  }

  // Негізгі цикл
  function loop(ts) {
    rafId = requestAnimationFrame(loop);
    if (!isRunning) { lastTs = ts; return; }
    if (!lastTs) lastTs = ts;

    const dt = ts - lastTs;
    lastTs = ts;

    accum += (SPEED_PX_PER_SEC * dt) / 1000;

    const step = Math.floor(accum);
    if (step >= 1) {
      accum -= step;

      if (atBottom()) {
        // === Соңына жеткенде тоқтату ===
        stopAuto();
        cancelAnimationFrame(rafId);
        rafId = null;
        return;
      }

      safeScrollBy(step);
    }
  }

  // Авто-скролды басқару
  function startAuto() { if (!isRunning) { isRunning = true; } }
  function stopAuto()  { isRunning = false; }

  function restartAfterDelay() {
    clearTimeout(resumeTimer);
    resumeTimer = setTimeout(() => startAuto(), RESTART_DELAY_MS);
  }

  // Пайдаланушы әрекеттерін тыңдау
  const onInteract = () => { stopAuto(); restartAfterDelay(); };
  window.addEventListener('touchstart', onInteract, { passive: true });
  window.addEventListener('touchmove',  onInteract, { passive: true });
  window.addEventListener('wheel',      onInteract, { passive: true });
  window.addEventListener('mousedown',  onInteract, { passive: true });
  window.addEventListener('keydown',    onInteract, { passive: true });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) { stopAuto(); }
    else { restartAfterDelay(); }
  });

  // Модалды жабу
  function closeModal() {
    modal.style.display = 'none';
    document.body.style.overflow = '';
  }

  playButton.addEventListener('click', () => {
    audio.play().catch(()=>{});
    closeModal();
    if (!rafId) rafId = requestAnimationFrame(loop);
    restartAfterDelay();
  });
</script>




  <script>

    document.addEventListener("DOMContentLoaded", function() {
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add("visible");
            observer.unobserve(entry.target);
          }
        });
      });

      var elements = document.querySelectorAll(".fade-in");
      elements.forEach(function(element) {
        observer.observe(element);
      });
    });
  </script>


<script>
    

   const URL_APP = "https://script.google.com/macros/s/AKfycbz8V-6JJ2ZQpnLb3ofHvZRCWNeU1zS8rDLCgHqKCJKonsZHA3D77yuwm4HOZcBSkAHO/exec";

const form = document.querySelector("#form");
form.action = URL_APP;

form.addEventListener("submit", async (ev) => {
  ev.preventDefault();

  const name = document.querySelector("[name=name]:checked");
  const choice = document.querySelector("[name=choice]:checked");
  const message = document.querySelector("[name=message]");

  let details = {
    name: name ? name.value : '',
    choice: choice ? choice.value : '',
    message: message.value.trim(),
  };

  let formBody = [];
  for (let property in details) {
    let encodedKey = encodeURIComponent(property);
    let encodedValue = encodeURIComponent(details[property]);
    formBody.push(encodedKey + "=" + encodedValue);
  }
  formBody = formBody.join("&");

  // форманы тазалау
  if (name) name.checked = false;
  if (choice) choice.checked = false;
  message.value = '';

  alert('Жауабыңызға рахмет!');

  fetch(URL_APP, {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8",
    },
    mode: "no-cors",
    body: formBody,
  }).catch((err) => {
    console.error('Error:', err);
    alert("Ошибка!");
  });
});

<script>
  class FallingHearts {
    constructor(selector, options = {}) {
      this.el = document.querySelector(selector);
      this.settings = Object.assign({
        delay: 300,
        minSize: 16,
        maxSize: 32,
        fallSpeed: 1,
        colors: ['#ff4d6d', '#ff9aa2', '#ff6f91', '#ffc0cb']
      }, options);
      this.el.style.overflowX = 'hidden';
      this.start();
    }

    start() {
      if (!this.animId) {
        this.animId = requestAnimationFrame(() => this.createHeart());
      }
    }

    stop(graceful = false) {
      cancelAnimationFrame(this.animId);
      this.animId = null;

      if (!graceful) {
        const hearts = document.querySelectorAll('.heart');
        hearts.forEach(h => h.remove());
      }
    }

    createHeart() {
      setTimeout(() => {
        this.animId = requestAnimationFrame(() => this.createHeart());
      }, this.settings.delay);

      const wrapper = document.createElement('div');
      wrapper.className = 'heart';

      const inner = document.createElement('div');
      inner.className = 'heart-inner';
      inner.innerText = '❤️';

      const size = Math.floor(Math.random() * (this.settings.maxSize - this.settings.minSize)) + this.settings.minSize;
      inner.style.fontSize = size + 'px';
      inner.style.color = this.settings.colors[Math.floor(Math.random() * this.settings.colors.length)];

      const fallTime = (document.documentElement.clientHeight * 0.007 + Math.random() * 5) * this.settings.fallSpeed;
      const swayTime = (2 + Math.random() * 2);

      wrapper.style.left = Math.random() * window.innerWidth + 'px';
      wrapper.style.animationDuration = `${fallTime}s`;

      inner.style.animationDuration = `${swayTime}s`;

      wrapper.appendChild(inner);
      this.el.appendChild(wrapper);

      wrapper.addEventListener('animationend', () => {
        wrapper.remove();
      });
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    window.heartAnimation = new FallingHearts('body', {
      delay: 300,
      minSize: 10,
      maxSize: 25,
      fallSpeed: 1.5,
      colors: ['#ff4d6d', '#ff6f91', '#ff85a1', '#ffb3c1']
    });
  });
</script>
